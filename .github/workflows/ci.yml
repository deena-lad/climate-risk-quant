# .github/workflows/ci.yml
# ─────────────────────────────────────────────────────────────────────────────
# Runs on every push and pull request to main.
# Jobs:
#   lint   — ruff + mypy static analysis
#   test   — pytest with coverage (synthetic data only, no network)
#   docker — builds the Docker image to catch dependency/layer errors early
#            (does NOT push; push is triggered by HuggingFace Spaces sync)

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"

jobs:
  # ── Lint ────────────────────────────────────────────────────────────────────
  lint:
    name: Lint & type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install lint deps
        run: pip install ruff mypy pydantic pydantic-settings

      - name: ruff check
        run: ruff check src/ app/ tests/
        continue-on-error: true

      - name: ruff format check
        run: ruff format --check src/ app/ tests/
        continue-on-error: true

      - name: mypy
        run: mypy src/ --ignore-missing-imports
        continue-on-error: true   # mypy errors are warnings until stubs are complete

  # ── Test ────────────────────────────────────────────────────────────────────
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install system geo deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libgdal-dev libgeos-dev libproj-dev libspatialindex-dev libeccodes-dev

      - name: Install Python deps
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Create .env for tests
        run: |
          cat > .env << 'EOF'
          CDS_API_KEY=00000:dummy-key-for-ci
          ERA5_YEAR_START=1990
          ERA5_YEAR_END=2023
          RISK_HAIRCUT_ALPHA=0.30
          WEIGHT_FLOOD=0.40
          WEIGHT_HEAT=0.35
          WEIGHT_CYCLONE=0.25
          LOG_LEVEL=WARNING
          EOF

      - name: Run tests with coverage
        run: |
          pytest tests/ \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=70 \
            -v \
            --tb=short

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: coverage.xml
          fail_ci_if_error: false

  # ── Docker build check ───────────────────────────────────────────────────────
  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: test
    # Only run on pushes to main (not PRs) to save minutes
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: climate-risk-quant:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILDKIT_INLINE_CACHE=1
